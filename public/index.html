<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ルーツ・クエスト</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:    #09080f;
      --card:  rgba(16, 12, 26, 0.97);
      --gold:  #d4af37;
      --gold-l:#f0d870;
      --gold-d:#a88820;
      --rose:  #c9758a;
      --text:  #f0ead8;
      --sub:   #8a7a68;
      --border:rgba(212,175,55,0.22);
      --borderS:rgba(212,175,55,0.52);
    }
    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Noto Serif JP','Hiragino Mincho ProN',serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:40px 20px 70px;
      position:relative;
      overflow-x:hidden;
    }
    body::before {
      content:'';
      position:fixed; top:-120px; right:-120px;
      width:560px; height:560px;
      background:radial-gradient(circle,rgba(100,55,150,0.22) 0%,transparent 70%);
      pointer-events:none;
    }
    body::after {
      content:'';
      position:fixed; bottom:-120px; left:-120px;
      width:640px; height:640px;
      background:radial-gradient(circle,rgba(180,120,30,0.14) 0%,transparent 70%);
      pointer-events:none;
    }

    /* ── 金の花びら ── */
    .petal { position:fixed; pointer-events:none; opacity:0; animation:fall linear infinite; z-index:0; }
    @keyframes fall {
      0%   { transform:translateY(-20px) rotate(0deg); opacity:0; }
      10%  { opacity:0.45; }
      90%  { opacity:0.28; }
      100% { transform:translateY(110vh) rotate(360deg); opacity:0; }
    }

    /* ── パーティクル ── */
    @keyframes sparkFly {
      0%   { opacity:1; transform:translate(-50%,-50%) scale(1); }
      100% { opacity:0; transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0.2); }
    }
    @keyframes shockwave {
      0%   { width:0; height:0; opacity:0.9; }
      100% { width:340px; height:340px; opacity:0; }
    }

    /* ── カード演出 ── */
    @keyframes cardReveal {
      0%   { opacity:0; transform:scale(0.82) translateY(18px); filter:brightness(2.5); }
      55%  { filter:brightness(1.4); }
      100% { opacity:1; transform:scale(1) translateY(0); filter:brightness(1); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes rareGlow {
      from { box-shadow:0 0 22px rgba(212,175,55,0.28), 0 10px 50px rgba(0,0,0,0.55); }
      to   { box-shadow:0 0 50px rgba(212,175,55,0.5),  0 10px 70px rgba(0,0,0,0.65); }
    }
    @keyframes shimmer {
      from { background-position:0% center; }
      to   { background-position:200% center; }
    }
    @keyframes spin  { 100% { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:0.45; } 50% { opacity:1; } }

    /* ── ラッパー ── */
    .wrapper { width:100%; max-width:430px; position:relative; z-index:1; }

    /* ── タイトル ── */
    .title-area { text-align:center; margin-bottom:28px; }
    .title-crest {
      font-size:0.65rem; letter-spacing:0.55em; color:var(--gold);
      margin-bottom:8px; opacity:0.75;
    }
    .title-main {
      font-family:'Shippori Mincho',serif; font-size:2.7rem; font-weight:800;
      background:linear-gradient(135deg,var(--gold-l),var(--gold),var(--gold-d));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      letter-spacing:0.22em; line-height:1.1; margin-bottom:10px;
    }
    .title-sub { font-size:0.73rem; color:var(--sub); letter-spacing:0.15em; line-height:1.8; }
    .title-rule {
      display:flex; align-items:center; gap:12px; margin-top:16px;
    }
    .title-rule::before,.title-rule::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(to right,transparent,var(--gold));
    }
    .title-rule::after { background:linear-gradient(to left,transparent,var(--gold)); }
    .title-rule-icon { color:var(--gold); font-size:0.85rem; opacity:0.8; }

    /* ── フォームカード ── */
    .form-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:30px 26px;
      box-shadow:0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
      margin-bottom:18px;
    }
    .form-card::before {
      content:''; display:block; height:1px;
      background:linear-gradient(to right,transparent,var(--borderS),transparent);
      margin-bottom:22px;
    }
    .form-group { margin-bottom:16px; }
    label { display:block; font-size:0.7rem; color:var(--sub); letter-spacing:0.2em; margin-bottom:7px; }
    .lj { font-size:0.88rem; color:var(--text); margin-right:7px; }
    input[type="text"] {
      width:100%; padding:12px 15px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(212,175,55,0.2);
      border-radius:10px; color:var(--text);
      font-size:0.97rem; font-family:'Noto Serif JP',serif;
      outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus {
      border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(212,175,55,0.1);
    }
    input[type="text"]::placeholder { color:rgba(240,234,216,0.18); }
    .btn-primary {
      width:100%; padding:14px; margin-top:6px;
      border:none; border-radius:50px;
      background:linear-gradient(135deg,#c9a020,#f0d060,#c9a020);
      background-size:200% auto;
      color:#1a1000;
      font-size:0.91rem; font-family:'Shippori Mincho',serif;
      font-weight:700; letter-spacing:0.32em;
      cursor:pointer; transition:all 0.25s;
      box-shadow:0 4px 22px rgba(212,175,55,0.32);
    }
    .btn-primary:hover { background-position:100% center; transform:translateY(-2px); box-shadow:0 6px 30px rgba(212,175,55,0.48); }
    .btn-primary:disabled { opacity:0.55; cursor:default; transform:none; }

    /* ── 結果エリア ── */
    .results-area { display:none; }

    /* ── キャラクターカード ── */
    .char-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:26px 22px 22px;
      box-shadow:0 8px 40px rgba(0,0,0,0.6);
      margin-bottom:14px;
      position:relative;
      overflow:hidden;
      text-align:center;
      min-height:200px;
    }
    .char-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(to right,transparent,var(--gold),transparent);
    }
    .char-card.rare { border-color:var(--borderS); }
    .char-card.revealed        { animation:cardReveal 0.7s ease-out forwards; }
    .char-card.rare.revealed   { animation:cardReveal 0.7s ease-out forwards, rareGlow 2.8s 0.7s ease-in-out infinite alternate; }

    .char-bg-glow {
      position:absolute; top:30%; left:50%; transform:translate(-50%,-50%);
      width:260px; height:260px; border-radius:50%;
      background:radial-gradient(circle,rgba(90,50,140,0.22) 0%,transparent 70%);
      pointer-events:none;
    }
    .char-card.rare .char-bg-glow {
      background:radial-gradient(circle,rgba(212,175,55,0.18) 0%,transparent 70%);
    }

    .rare-badge {
      display:inline-block;
      background:linear-gradient(90deg,#b89020,#f0d060,#b89020);
      background-size:200% auto;
      color:#1a1000; font-size:0.6rem; font-weight:800;
      letter-spacing:0.32em; padding:4px 16px; border-radius:20px;
      margin-bottom:14px;
      animation:shimmer 2.2s linear infinite;
    }
    .char-sec-label {
      font-size:0.62rem; letter-spacing:0.32em; color:var(--sub); margin-bottom:14px;
    }

    /* ── キャラアイコン ── */
    .char-icon-wrap {
      width:155px; height:175px;
      margin:0 auto 18px; position:relative;
    }
    .char-icon-wrap svg { width:100%; height:100%; }
    .char-shadow {
      position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
      width:110px; height:26px; border-radius:50%;
      background:radial-gradient(ellipse,rgba(212,175,55,0.32) 0%,transparent 70%);
    }
    .char-card.rare .char-shadow {
      background:radial-gradient(ellipse,rgba(212,175,55,0.55) 0%,transparent 70%);
    }

    /* ── 名前 ── */
    .char-name {
      font-family:'Shippori Mincho',serif;
      font-size:1.52rem; font-weight:800;
      color:var(--text); letter-spacing:0.12em;
      margin-bottom:10px; line-height:1.3;
      text-shadow:0 0 22px rgba(212,175,55,0.18);
    }
    .char-card.rare .char-name {
      background:linear-gradient(135deg,#f5f0e0,var(--gold-l),#f5f0e0);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .char-type-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(212,175,55,0.08);
      border:1px solid var(--border); border-radius:20px;
      padding:5px 16px; font-size:0.76rem;
      color:rgba(212,175,55,0.9); letter-spacing:0.1em;
      margin-bottom:18px;
    }
    .char-divider {
      display:flex; align-items:center; gap:8px; margin:0 0 13px;
    }
    .char-divider .cl { flex:1; height:1px; background:var(--border); }
    .char-divider .ci { font-size:0.7rem; color:var(--gold); opacity:0.6; }
    .char-feature {
      font-size:0.84rem; line-height:1.95;
      color:rgba(240,234,216,0.72);
      text-align:left; margin-bottom:15px;
    }

    /* ── 吹き出し ── */
    .speech-bubble {
      background:rgba(212,175,55,0.06);
      border:1px solid rgba(212,175,55,0.26);
      border-radius:14px; padding:13px 16px 13px 22px;
      text-align:left; position:relative;
    }
    .speech-bubble::before {
      content:'❝'; position:absolute; top:6px; left:8px;
      font-size:1.3rem; color:var(--gold); opacity:0.35; line-height:1;
    }
    .speech-lbl {
      font-size:0.6rem; color:var(--gold); opacity:0.75;
      letter-spacing:0.22em; margin-bottom:4px;
    }
    .speech-text { font-size:0.88rem; color:var(--text); line-height:1.8; }

    /* ── ローディング ── */
    .loading-wrap { text-align:center; padding:38px 0 28px; }
    .summon-ring {
      width:60px; height:60px;
      border:2px solid rgba(212,175,55,0.15);
      border-top:2px solid var(--gold);
      border-radius:50%;
      animation:spin 1s linear infinite;
      margin:0 auto 14px;
    }
    .loading-text {
      font-size:0.78rem; color:var(--sub); letter-spacing:0.22em;
      animation:pulse 1.6s ease-in-out infinite;
    }

    /* ── 情報カード共通 ── */
    .info-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px; padding:20px 20px;
      box-shadow:0 4px 24px rgba(0,0,0,0.5);
      margin-bottom:14px;
      animation:fadeUp 0.5s ease forwards;
    }
    .info-card::before {
      content:''; display:block; height:1px;
      background:linear-gradient(to right,transparent,var(--borderS),transparent);
      margin-bottom:15px;
    }
    .card-hdr {
      font-family:'Shippori Mincho',serif;
      font-size:0.83rem; font-weight:600;
      color:var(--gold); letter-spacing:0.22em;
      margin-bottom:13px; opacity:0.9;
    }

    /* ── 名字ルーツリスト ── */
    .nr-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
    .nr-list li {
      display:flex; align-items:baseline; gap:10px;
      padding:8px 12px;
      background:rgba(255,255,255,0.025);
      border-radius:8px;
      border-left:2px solid var(--border);
    }
    .nr-icon  { font-size:0.88rem; flex-shrink:0; }
    .nr-lbl   { font-size:0.66rem; color:var(--sub); letter-spacing:0.15em; flex-shrink:0; min-width:2.4em; }
    .nr-val   { font-size:0.84rem; color:var(--text); flex:1; line-height:1.55; }

    /* ── ストーリー ── */
    .story-text { font-size:0.87rem; line-height:2.05; color:rgba(240,234,216,0.75); }

    /* ── 区切り ── */
    .divider-or {
      display:flex; align-items:center; gap:12px;
      margin:8px 0 14px;
    }
    .divider-or::before,.divider-or::after {
      content:''; flex:1; height:1px; background:var(--border);
    }
    .divider-or span { font-size:0.62rem; color:var(--sub); letter-spacing:0.22em; }

    .btn-secondary {
      width:100%; padding:13px;
      border:1px solid rgba(143,168,143,0.3); border-radius:50px;
      background:rgba(100,140,100,0.1);
      color:rgba(180,220,180,0.75);
      font-size:0.87rem; font-family:'Shippori Mincho',serif;
      font-weight:500; letter-spacing:0.26em;
      cursor:pointer; transition:all 0.25s;
    }
    .btn-secondary:hover { background:rgba(100,140,100,0.2); transform:translateY(-2px); }

    .footer {
      text-align:center; margin-top:30px;
      font-size:0.6rem; color:rgba(138,122,104,0.45); letter-spacing:0.2em;
    }

    /* ── 背景枝装飾 ── */
    .deco {
      position:fixed; pointer-events:none; opacity:0.07;
    }
    .deco-tl { top:0; left:0; width:200px; }
    .deco-br { bottom:0; right:0; width:200px; transform:rotate(180deg); }
  </style>
</head>
<body>

  <!-- 背景枝 -->
  <svg class="deco deco-tl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,180 Q40,120 80,100 Q120,80 150,40 Q160,20 180,0" stroke="#d4af37" stroke-width="1.5" fill="none"/>
    <circle cx="80" cy="100" r="5" fill="#d4af37"/>
    <circle cx="120" cy="80" r="4" fill="#d4af37"/>
    <circle cx="150" cy="40" r="5" fill="#d4af37"/>
    <g transform="translate(78,96) scale(0.7)">
      <circle cx="0" cy="-6" r="3.5" fill="#d4af37"/><circle cx="5.7" cy="-1.9" r="3.5" fill="#d4af37"/>
      <circle cx="3.5" cy="5.2" r="3.5" fill="#d4af37"/><circle cx="-3.5" cy="5.2" r="3.5" fill="#d4af37"/>
      <circle cx="-5.7" cy="-1.9" r="3.5" fill="#d4af37"/>
    </g>
  </svg>
  <svg class="deco deco-br" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,180 Q40,120 80,100 Q120,80 150,40 Q160,20 180,0" stroke="#d4af37" stroke-width="1.5" fill="none"/>
    <circle cx="80" cy="100" r="5" fill="#d4af37"/>
    <circle cx="150" cy="40" r="5" fill="#d4af37"/>
  </svg>

  <div class="wrapper">

    <!-- タイトル -->
    <div class="title-area">
      <div class="title-crest">— ANCESTRAL LEGEND —</div>
      <h1 class="title-main">ルーツ・クエスト</h1>
      <p class="title-sub">名字と出身地から、あなたのご先祖さまへ</p>
      <div class="title-rule"><span class="title-rule-icon">✦</span></div>
    </div>

    <!-- フォーム -->
    <div class="form-card">
      <form id="rootsForm">
        <div class="form-group">
          <label>
            <span class="lj">名字</span>
            <span style="font-size:0.66rem;letter-spacing:0.15em;color:var(--sub)">FAMILY NAME</span>
          </label>
          <input type="text" id="myoji" name="myoji" placeholder="例：田中、鈴木、佐藤" required>
        </div>
        <div class="form-group">
          <label>
            <span class="lj">出身地</span>
            <span style="font-size:0.66rem;letter-spacing:0.15em;color:var(--sub)">BIRTHPLACE</span>
          </label>
          <input type="text" id="shusshinchi" name="shusshinchi" placeholder="例：京都府、薩摩、陸奥" required>
        </div>
        <button type="submit" class="btn-primary">ご先祖さまを探る</button>
      </form>
    </div>

    <!-- ── 結果エリア ── -->
    <div class="results-area" id="resultsArea">

      <!-- 1. キャラクターカード -->
      <div class="char-card" id="charCard">
        <div class="char-bg-glow"></div>
        <div class="loading-wrap" id="charLoading">
          <div class="summon-ring"></div>
          <p class="loading-text">ご先祖を召喚中...</p>
        </div>
        <div id="charContent" style="display:none"></div>
      </div>

      <!-- 2. 名字ルーツカード -->
      <div class="info-card" id="namerootCard" style="display:none">
        <div class="card-hdr">📖 名字のルーツ</div>
        <div id="namerootContent">
          <div class="loading-wrap" style="padding:12px 0">
            <p class="loading-text">調査中...</p>
          </div>
        </div>
      </div>

      <!-- 3. ストーリーカード -->
      <div class="info-card" id="storyCard" style="display:none">
        <div class="card-hdr">📜 ご先祖の物語</div>
        <p class="story-text" id="resultText"></p>
      </div>

    </div>

    <div class="divider-or"><span>または</span></div>
    <button class="btn-secondary" onclick="alert('近日公開予定です')">歴史マップで探す</button>
    <div class="footer">&copy; 2025 Roots Quest ｜ あなたの物語が、ここから始まる</div>

  </div>

  <script>
    // ══════════════════════════════════════════
    // アニメ風SVGキャラクター生成
    // ══════════════════════════════════════════
    function ch({h, hf='', ha='', xtra='', c, s='#fce8d8', e='#2d1b0e', sad=false, blush=true}) {
      const bl = blush ? `
        <ellipse cx="17" cy="40" rx="6.5" ry="3" fill="#f4a0b0" opacity="0.38"/>
        <ellipse cx="43" cy="40" rx="6.5" ry="3" fill="#f4a0b0" opacity="0.38"/>` : '';

      const mkEye = (cx) => `
        <ellipse cx="${cx}" cy="32" rx="5.5" ry="6.5" fill="${e}"/>
        <ellipse cx="${cx}" cy="30" rx="4.5" ry="4" fill="#4068b8" opacity="0.42"/>
        <circle  cx="${cx-2}" cy="27.5" r="2.6" fill="white"/>
        <circle  cx="${cx+2.5}" cy="35" r="1.2" fill="white" opacity="0.5"/>
        <ellipse cx="${cx}" cy="25.5" rx="5.2" ry="1.9" fill="${e}" opacity="0.95"/>`;

      const brows = sad ? `
        <path d="M14,24 Q18,22.5 24,24.5" stroke="#3a2010" stroke-width="1.9" fill="none" stroke-linecap="round"/>
        <path d="M36,24.5 Q42,22.5 46,24" stroke="#3a2010" stroke-width="1.9" fill="none" stroke-linecap="round"/>` : `
        <path d="M14,24 Q18,21 24,23" stroke="#3a2010" stroke-width="1.9" fill="none" stroke-linecap="round"/>
        <path d="M36,23 Q42,21 46,24" stroke="#3a2010" stroke-width="1.9" fill="none" stroke-linecap="round"/>`;

      const mouth = sad
        ? `<path d="M23,50 Q30,46.5 37,50" stroke="#c07870" stroke-width="1.5" fill="none" stroke-linecap="round"/>`
        : `<path d="M23,50 Q30,54 37,50"  stroke="#c07870" stroke-width="1.5" fill="none" stroke-linecap="round"/>`;

      return `<svg viewBox="0 0 60 82" xmlns="http://www.w3.org/2000/svg">
        ${h}
        <path d="M16,18 Q16,4 30,4 Q44,4 44,18 L43,44 Q41,61 30,65 Q19,61 17,44 Z" fill="${s}"/>
        ${bl}${mkEye(21)}${mkEye(39)}${brows}
        <path d="M28,43 Q30,45.5 32,43" stroke="#d8a888" stroke-width="1.1" fill="none" stroke-linecap="round"/>
        ${mouth}${hf}${ha}${xtra}
        <path d="M8,82 Q17,69 30,65 Q43,69 52,82 Z" fill="${c}"/>
        <path d="M23,65 L30,74 L37,65" stroke="${c}" stroke-width="3.2" fill="none" stroke-linecap="round"/>
      </svg>`;
    }

    // ハイライト付きヘア（60x82 viewBox用）
    const H = (col, ex='') => `
      <path d="M14,19 Q14,2 30,1 Q46,2 46,19 L46,26 Q40,17 30,15 Q20,17 14,26 Z" fill="${col}"/>
      <ellipse cx="30" cy="9" rx="16" ry="12" fill="${col}"/>
      ${ex}
      <ellipse cx="27" cy="6" rx="11" ry="5" fill="white" opacity="0.15"/>`;

    // 長髪（サイドカーテン付き）
    const HL = (col, ex='') => `
      ${H(col, ex)}
      <rect x="10" y="24" width="8" height="30" rx="4" fill="${col}"/>
      <rect x="42" y="24" width="8" height="30" rx="4" fill="${col}"/>`;

    const CHARACTER_SVGS = {
      farmer: ch({
        h: H('#8b5e3c', `<ellipse cx="30" cy="11" rx="7" ry="7" fill="#7a5030"/>`),
        ha: `<rect x="12" y="21" width="36" height="5" rx="2.5" fill="#d49060" opacity="0.88"/>`,
        c: '#a89060'

    // ══════════════════════════════════════════
    // パーティクル演出
    // ══════════════════════════════════════════
    function launchSparkles(el, count) {
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 3;
      const colors = ['#f0d060','#d4af37','#ffffff','#f5c842','#ffe88a','#ffd700'];
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i / count) + (Math.random() - 0.5) * 0.55;
        const dist  = 65 + Math.random() * 140;
        const size  = 2.5 + Math.random() * 5.5;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const dur   = 0.5 + Math.random() * 0.45;
        const s = document.createElement('div');
        s.style.cssText = `position:fixed;z-index:9999;
          left:${cx}px;top:${cy}px;
          width:${size}px;height:${size}px;border-radius:50%;
          background:${color};box-shadow:0 0 ${size*2.5}px ${color};
          pointer-events:none;transform:translate(-50%,-50%);
          animation:sparkFly ${dur}s ease-out forwards;`;
        s.style.setProperty('--dx', Math.cos(angle)*dist+'px');
        s.style.setProperty('--dy', Math.sin(angle)*dist+'px');
        document.body.appendChild(s);
        setTimeout(() => s.remove(), dur*1000 + 120);
      }
    }

    function launchShockwave(el) {
      const r = el.getBoundingClientRect();
      const d = document.createElement('div');
      d.style.cssText = `position:fixed;z-index:9998;
        left:${r.left+r.width/2}px;top:${r.top+r.height/3}px;
        width:0;height:0;border-radius:50%;
        border:3px solid rgba(212,175,55,0.85);
        pointer-events:none;transform:translate(-50%,-50%);
        animation:shockwave 0.65s ease-out forwards;`;
      document.body.appendChild(d);
      setTimeout(() => d.remove(), 780);
    }

    // ══════════════════════════════════════════
    // フォーム送信
    // ══════════════════════════════════════════
    document.getElementById('rootsForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const myoji       = document.getElementById('myoji').value;
      const shusshinchi = document.getElementById('shusshinchi').value;
      const submitBtn   = this.querySelector('button[type="submit"]');
      const resultsArea = document.getElementById('resultsArea');
      const charCard    = document.getElementById('charCard');
      const storyCard   = document.getElementById('storyCard');
      const namerootCard= document.getElementById('namerootCard');
      const resultText  = document.getElementById('resultText');

      submitBtn.disabled = true;
      submitBtn.textContent = '召喚中...';
      document.getElementById('charLoading').innerHTML =
        '<div class="summon-ring"></div><p class="loading-text">ご先祖を召喚中...</p>';
      document.getElementById('charLoading').style.display = 'block';
      document.getElementById('charContent').style.display = 'none';
      charCard.className = 'char-card';
      document.getElementById('namerootContent').innerHTML =
        '<div class="loading-wrap" style="padding:10px 0"><p class="loading-text">調査中...</p></div>';
      resultText.textContent = '';
      resultsArea.style.display   = 'block';
      storyCard.style.display     = 'block';
      namerootCard.style.display  = 'block';
      charCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

      let story = '';
      try {
        const res = await fetch('/api/story', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myoji, shusshinchi }),
        });
        if (res.status === 429) throw new Error('rate_limit');
        if (!res.ok) throw new Error('error');

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          for (const line of decoder.decode(value, { stream: true }).split('\n')) {
            if (!line.startsWith('data: ')) continue;
            const d = line.slice(6);
            if (d === '[DONE]') break;
            try { const { text } = JSON.parse(d); story += text; resultText.textContent = story; } catch {}
          }
        }

        if (story) {
          await Promise.all([
            fetchCharacter(myoji, shusshinchi, story),
            fetchNameroot(myoji),
          ]);
        }
      } catch (err) {
        const msg = err.message === 'rate_limit'
          ? 'アクセスが集中しています。しばらくしてからお試しください。'
          : 'エラーが発生しました。もう一度お試しください。';
        resultText.innerHTML = `<span style="color:rgba(200,160,110,0.7)">${msg}</span>`;
        document.getElementById('charLoading').innerHTML = `<p class="loading-text" style="color:rgba(200,160,110,0.7)">${msg}</p>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'ご先祖さまを探る';
      }
    });

    // ══════════════════════════════════════════
    // キャラクター
    // ══════════════════════════════════════════
    async function fetchCharacter(myoji, shusshinchi, story) {
      try {
        const res = await fetch('/api/character', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myoji, shusshinchi, story }),
        });
        if (!res.ok) throw new Error();
        renderCharacter(await res.json());
      } catch {
        document.getElementById('charLoading').innerHTML =
          '<p class="loading-text" style="color:rgba(200,160,110,0.7)">キャラクター判定に失敗しました</p>';
      }
    }

    function renderCharacter(data) {
      const card    = document.getElementById('charCard');
      const loading = document.getElementById('charLoading');
      const content = document.getElementById('charContent');
      const svg     = CHARACTER_SVGS[data.key] || CHARACTER_SVGS.farmer;

      card.className = 'char-card' + (data.isRare ? ' rare' : '');
      content.innerHTML = `
        ${data.isRare ? '<div class="rare-badge">✨ RARE CHARACTER ✨</div><br>' : ''}
        <div class="char-sec-label">✦ ご先祖キャラクター ✦</div>
        <div class="char-icon-wrap">
          ${svg}
          <div class="char-shadow"></div>
        </div>
        <div class="char-name">${data.ancestorName}</div>
        <div class="char-type-badge">${data.typeName}｜${data.typeDesc}</div>
        <div class="char-divider"><div class="cl"></div><div class="ci">❧</div><div class="cl"></div></div>
        <p class="char-feature">${data.feature}</p>
        <div class="speech-bubble">
          <div class="speech-lbl">ご先祖さまより</div>
          <p class="speech-text">${data.comment}</p>
        </div>
      `;
      loading.style.display = 'none';
      content.style.display = 'block';
      card.classList.add('revealed');

      setTimeout(() => {
        launchSparkles(card, data.isRare ? 42 : 24);
        if (data.isRare) launchShockwave(card);
      }, 120);
    }

    // ══════════════════════════════════════════
    // 名字ルーツ
    // ══════════════════════════════════════════
    async function fetchNameroot(myoji) {
      try {
        const res = await fetch('/api/nameroot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ myoji }),
        });
        if (!res.ok) throw new Error();
        renderNameroot(myoji, await res.json());
      } catch {
        document.getElementById('namerootContent').innerHTML =
          '<p style="font-size:0.8rem;color:var(--sub)">取得に失敗しました</p>';
      }
    }

    function renderNameroot(myoji, data) {
      document.getElementById('namerootContent').innerHTML = `
        <p style="font-family:'Shippori Mincho',serif;font-size:1.05rem;font-weight:700;
          color:var(--text);letter-spacing:0.15em;margin-bottom:12px;text-align:center">
          「${myoji}」という名字
        </p>
        <ul class="nr-list">
          <li><span class="nr-icon">📍</span><span class="nr-lbl">発祥</span><span class="nr-val">${data.birthplace}</span></li>
          <li><span class="nr-icon">⏳</span><span class="nr-lbl">時代</span><span class="nr-val">${data.era}</span></li>
          <li><span class="nr-icon">📜</span><span class="nr-lbl">由来</span><span class="nr-val">${data.origin}</span></li>
          <li><span class="nr-icon">✨</span><span class="nr-lbl">意味</span><span class="nr-val">${data.meaning}</span></li>
        </ul>
      `;
    }

    // ══════════════════════════════════════════
    // 金の花びら
    // ══════════════════════════════════════════
    function createPetal() {
      const p = document.createElement('div');
      p.className = 'petal';
      const size = Math.random() * 10 + 7;
      const left = Math.random() * 100;
      const dur  = Math.random() * 8 + 10;
      const delay= Math.random() * 5;
      p.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="10" cy="5" rx="4" ry="5.5" fill="rgba(212,175,55,0.42)" transform="rotate(0 10 10)"/>
        <ellipse cx="10" cy="5" rx="4" ry="5.5" fill="rgba(212,175,55,0.42)" transform="rotate(72 10 10)"/>
        <ellipse cx="10" cy="5" rx="4" ry="5.5" fill="rgba(212,175,55,0.42)" transform="rotate(144 10 10)"/>
        <ellipse cx="10" cy="5" rx="4" ry="5.5" fill="rgba(212,175,55,0.42)" transform="rotate(216 10 10)"/>
        <ellipse cx="10" cy="5" rx="4" ry="5.5" fill="rgba(212,175,55,0.42)" transform="rotate(288 10 10)"/>
      </svg>`;
      p.style.cssText = `position:fixed;left:${left}vw;top:-30px;pointer-events:none;
        animation:fall ${dur}s ${delay}s linear infinite;z-index:0;`;
      document.body.appendChild(p);
      setTimeout(() => { p.remove(); createPetal(); }, (dur + delay) * 1000);
    }
    for (let i = 0; i < 10; i++) setTimeout(() => createPetal(), i * 700);
  </script>
